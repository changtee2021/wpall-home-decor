<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>รีเซ็ตรหัสผ่าน · WP ALL</title>
  </head>
  <body
    style="
      margin: 0;
      padding: 0;
      background: #f4f6f5;
      font-family: &quot;Segoe UI&quot;, Tahoma, Geneva, Verdana, sans-serif;
    "
  >
    <table
      role="presentation"
      width="100%"
      cellspacing="0"
      cellpadding="0"
      style="background: #f4f6f5; padding: 32px 16px"
    >
      <tr>
        <td align="center">
          <table
            role="presentation"
            width="100%"
            cellspacing="0"
            cellpadding="0"
            style="
              max-width: 520px;
              background: #ffffff;
              border-radius: 20px;
              overflow: hidden;
              box-shadow: 0 8px 32px rgba(15, 60, 45, 0.08);
            "
          >
            <tr>
              <td
                style="
                  background: linear-gradient(135deg, #1a5c45 0%, #2d8a66 100%);
                  padding: 32px 28px;
                  text-align: center;
                "
              >
                <div
                  style="
                    display: inline-block;
                    background: #ffffff;
                    border-radius: 14px;
                    padding: 10px 14px;
                    margin-bottom: 16px;
                  "
                >
                  <span style="font-size: 22px; font-weight: 800; color: #1a5c45">WP</span
                  ><span style="font-size: 22px; font-weight: 800; color: #f59e0b">ALL</span>
                </div>
                <h1 style="margin: 0; color: #ffffff; font-size: 22px; font-weight: 700">
                  ตั้งรหัสผ่านใหม่
                </h1>
              </td>
            </tr>
            <tr>
              <td style="padding: 32px 28px">
                <p style="margin: 0 0 24px; font-size: 15px; color: #334155; line-height: 1.6">
                  เราได้รับคำขอรีเซ็ตรหัสผ่านสำหรับบัญชี WP ALL ของคุณ
                  กดปุ่มด้านล่างเพื่อตั้งรหัสผ่านใหม่
                </p>
                <table role="presentation" width="100%" cellspacing="0" cellpadding="0">
                  <tr>
                    <td align="center" style="padding: 8px 0 24px">
                      <a
                        href="{{ .ConfirmationURL }}"
                        style="
                          display: inline-block;
                          background: #1a5c45;
                          color: #ffffff;
                          text-decoration: none;
                          font-size: 16px;
                          font-weight: 700;
                          padding: 14px 36px;
                          border-radius: 12px;
                        "
                      >
                        ตั้งรหัสผ่านใหม่
                      </a>
                    </td>
                  </tr>
                </table>
                <p style="margin: 0; font-size: 12px; color: #94a3b8; line-height: 1.6">
                  หากคุณไม่ได้ขอรีเซ็ตรหัสผ่าน สามารถละเว้นอีเมลนี้ได้
                </p>
              </td>
            </tr>
            <tr>
              <td
                style="
                  background: #f8fafc;
                  padding: 20px 28px;
                  text-align: center;
                  border-top: 1px solid #e2e8f0;
                "
              >
                <p style="margin: 0; font-size: 11px; color: #94a3b8">WP ALL · info@wpallin1.com</p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
